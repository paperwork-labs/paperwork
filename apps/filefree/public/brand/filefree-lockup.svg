<svg width="720" height="150" viewBox="0 0 720 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FileFree">
  <svg x="11" y="11" width="128" height="128" viewBox="0 0 128 128">

      <!-- Folded document silhouette: top-right corner is folded in -->
