      />
      <!-- The fold flap, showing the back of the corner -->
      <path
        d="M82 18 L82 42 L106 42"
        stroke="#3274F0"
        stroke-width="9"
        stroke-linejoin="round"
        fill="none"
      />
      <!-- Filed/done checkmark in amber, mid-document -->
      <path
        d="M48 78 L60 90 L86 64"
        stroke="#F59E0B"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />

  </svg>
  <text
    x="160"
