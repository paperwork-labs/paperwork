<svg width="720" height="150" viewBox="0 0 720 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trinkets">
  <svg x="11" y="11" width="128" height="128" viewBox="0 0 128 128">

      <!-- Constellation of small utility tools: 5 dots connected by lines -->
      <!-- Lines first so dots overlay them -->
      <path
        d="M34 36 L88 32 L96 70 L60 92 L26 78 L34 36 M34 36 L96 70 M60 92 L88 32"
        stroke="#60A5FA"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.55"
      />
      <!-- Outer constellation nodes (azure) -->
      <circle cx="34" cy="36" r="8" fill="#60A5FA"/>
      <circle cx="88" cy="32" r="8" fill="#60A5FA"/>
      <circle cx="96" cy="70" r="8" fill="#60A5FA"/>
      <circle cx="60" cy="92" r="8" fill="#60A5FA"/>
      <circle cx="26" cy="78" r="8" fill="#60A5FA"/>
      <!-- Center node in amber: the "trinket" highlight -->
      <circle cx="60" cy="60" r="7" fill="#FBBF24"/>

  </svg>
  <text
    x="160"
    y="98"
    fill="#FAFAFA"
    font-size="62"
    font-weight="600"
    letter-spacing="-0.5"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
  >Trinkets</text>
</svg>
