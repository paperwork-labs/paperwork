app = "axiomfolio-api"
primary_region = "iad"

[build]
  image = "ghcr.io/owner/repo/backend:sha-REPLACE"

[env]
  ENVIRONMENT = "production"
  AUTO_MIGRATE_ON_STARTUP = "false"
  LOG_FORMAT = "json"

[processes]
  app = "uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --log-level info"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

