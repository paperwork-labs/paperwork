<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="preconnect" href="https://s3.tradingview.com" crossorigin>

  <!-- PWA: web app manifest. Source of truth lives at /public/manifest.webmanifest. -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#020617" />
  <meta name="application-name" content="AxiomFolio" />
  <meta name="description"
    content="Quantitative portfolio intelligence: stage analysis, market regime, and rules-based execution across IBKR, TastyTrade, and Schwab." />

  <!-- iOS Safari: Add-to-Home-Screen. iOS ignores manifest icons and uses
       these tags + apple-touch-icon for the home-screen tile. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AxiomFolio" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

  <title>AxiomFolio - Portfolio Management</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
