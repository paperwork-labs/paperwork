[tool.ruff]
target-version = "py311"
line-length = 100
src = ["api"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
    "DTZ",  # datetime timezone (UTC discipline)
]
ignore = [
    "S101",  # assert used in tests
    "S105",  # hardcoded password (false positives on env vars)
    "S106",  # hardcoded password
    "B008",  # Depends() in function defaults — idiomatic FastAPI
    "S607",  # partial executable path — intentional for alembic CLI
    "N818",  # AppException naming — base class, not user-facing
    "UP042", # str+Enum → StrEnum — defer to avoid SQLAlchemy enum migration risk
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
# CI-facing CLIs/tests: intentional stdout/stderr output; trusted subprocess to git.
"scripts/check_alembic_heads.py" = ["T201"]
"scripts/check_dockerfile_healthcheck.py" = ["T201", "S603"]
"scripts/check_parents_import_safety.py" = ["T201"]
"scripts/tests/test_parents_import_safety_examples.py" = ["S603"]
"scripts/cloudflare_decommission_zones.py" = ["T201"]
"scripts/cloudflare_issue_readonly_tokens.py" = ["T201"]
"scripts/reconcile_clerk_dns.py" = ["T201", "S603"]
"scripts/check_pre_deploy.py" = ["T201", "S603"]
"tests/scripts/**" = ["T201", "ARG002", "E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["redis.*", "slowapi.*", "passlib.*", "jose.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["api/tests"]
asyncio_mode = "auto"
