[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "paperwork-auth"
version = "0.2.0"
description = "Clerk JWT verification + FastAPI dependency for Paperwork Labs services."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "Paperwork Labs" }]
keywords = ["clerk", "jwt", "fastapi", "auth"]
dependencies = [
  "python-jose[cryptography]>=3.3.0",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.110"]
http = ["httpx>=0.27"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.setuptools]
packages = ["paperwork_auth"]
