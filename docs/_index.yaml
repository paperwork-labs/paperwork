# Studio docs hub taxonomy.
#
# Track N of the Infra & Automation Hardening Sprint — consumed by
# apps/studio/src/lib/docs.ts to render /admin/docs. Edit here when you
# add, rename, or re-categorize a doc. Philosophy docs are immutable
# (CODEOWNERS-locked); see docs/philosophy/README.md.
#
# Each entry:
#   slug       — URL slug under /admin/docs/<slug> (no extension)
#   path       — path relative to repo root (must exist)
#   title      — display title (overrides H1 in list views)
#   summary    — one-line description for list + search hits
#   tags       — free-form tags for filtering
#   owners     — persona slugs responsible for keeping the doc honest
#   category   — philosophy | architecture | runbooks | generated | reference

categories:
  philosophy:
    label: Philosophy
    description: Immutable truths about how Paperwork Labs operates. Change requires org-wide sign-off (CODEOWNERS locks this folder).
    order: 1
  architecture:
    label: Architecture
    description: System design, data flows, and long-lived contracts between services.
    order: 2
  runbooks:
    label: Runbooks
    description: Operational playbooks — deploy, rotate, respond, repair.
    order: 3
  reference:
    label: Reference
    description: Canonical product, brand, and partner specs. Read when you need the spec; update when reality diverges.
    order: 4
  plans:
    label: Plans
    description: Long-lived per-product master plans, gap audits, and migration roadmaps.
    order: 5
  sprints:
    label: Sprints
    description: Cross-cutting time-boxed work logs. Each sprint links back to a PR + lessons.
    order: 6
  generated:
    label: Generated
    description: Auto-produced from code (personas, PR automation, etc). Do not edit by hand; fix the generator.
    order: 7

