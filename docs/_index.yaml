# Studio docs hub taxonomy.
#
# Auto-maintained by scripts/generate_docs_index.py.
#
# - Discovery, removal, and ordering happen automatically.
# - To override the auto-derived title / summary / tags /
#   owners / slug / category for a doc, edit this file —
#   the generator preserves overrides keyed by `path`.
# - To exclude a doc, add it to EXCLUDED_FILES /
#   EXCLUDED_SUBDIRS in the generator (and check_docs_index).
# - The `categories:` block below is hand-maintained.

categories:
  philosophy:
    label: Philosophy
    description: Immutable truths about how Paperwork Labs operates. Change requires org-wide sign-off (CODEOWNERS locks this folder).
    order: 1
  architecture:
    label: Architecture
    description: "System design, data flows, and long-lived contracts between services."
    order: 2
  runbooks:
    label: Runbooks
    description: "Operational playbooks — deploy, rotate, respond, repair."
    order: 3
  reference:
    label: Reference
    description: "Canonical product, brand, and partner specs. Read when you need the spec; update when reality diverges."
    order: 4
  plans:
    label: Plans
    description: "Long-lived per-product master plans, gap audits, and migration roadmaps."
    order: 5
  sprints:
    label: Sprints
    description: Cross-cutting time-boxed work logs. Each sprint links back to a PR + lessons.
    order: 6
  generated:
    label: Generated
    description: "Auto-produced from code (personas, PR automation, etc). Do not edit by hand; fix the generator."
    order: 7

