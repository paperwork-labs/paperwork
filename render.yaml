# Render Blueprints — Production Infrastructure as Code
# https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo to Render, it auto-detects render.yaml.
# Database and Redis are provisioned via Neon and Upstash (not Render).

services:
  - type: web
    name: filefree-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: cd apis/filefree && pip install -r requirements.txt
    preDeployCommand: cd apis/filefree && alembic upgrade head
    startCommand: cd apis/filefree && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: FRONTEND_URL
        value: https://filefree.ai
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: launchfree-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: cd apis/launchfree && pip install -r requirements.txt
    preDeployCommand: cd apis/launchfree && alembic upgrade head
    startCommand: cd apis/launchfree && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://launchfree.ai
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Brain API — Paperwork Labs command-center / agent backend.
  - type: web
    name: brain-api
    runtime: docker
    region: oregon
    plan: starter
    numInstances: 1
    dockerfilePath: apis/brain/Dockerfile
    dockerContext: apis/brain
    healthCheckPath: /health
    envVars:
      # Set in Dashboard, link from a Render Postgres in this Blueprint, or use fromDatabase when a DB is defined below.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: BRAIN_API_SECRET
        generateValue: true
      - key: BRAIN_MCP_TOKEN
        generateValue: true
      - key: BRAIN_URL
        value: https://brain.paperworklabs.com
      - key: AXIOMFOLIO_API_URL
        sync: false
      - key: AXIOMFOLIO_API_KEY
        sync: false
      - key: AXIOMFOLIO_WEBHOOK_SECRET
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: NEON_API_KEY
        sync: false
      - key: N8N_URL
        value: https://n8n.paperworklabs.com
      - key: N8N_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://langfuse.paperworklabs.com
      - key: FRONTEND_URL
        value: https://paperworklabs.com
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
