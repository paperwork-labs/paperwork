services:
  - type: web
    name: axiomfolio-api
    env: docker
    plan: standard
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: AUTO_MIGRATE_ON_STARTUP
        value: "false"
      - key: ENABLE_CELERY_BEAT
        value: "false"
      - key: ENABLE_REDBEAT
        value: "false"
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: RATE_LIMIT_STORAGE_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString

  - type: worker
    name: axiomfolio-worker
    env: docker
    plan: standard
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
    startCommand: celery -A backend.tasks.celery_app worker --loglevel=info

  - type: static
    name: axiomfolio-frontend
    autoDeploy: false
    buildCommand: cd frontend && npm ci && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.axiomfolio.com/api/v1

  - type: redis
    name: axiomfolio-redis
    plan: starter

databases:
  - name: axiomfolio-db
    plan: basic-1gb

cronJobs:
  - name: ibkr-daily-flex-sync
    schedule: "15 2 * * *"
    env: docker
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
    command: python -m backend.scripts.run_task backend.tasks.account_sync.sync_all_ibkr_accounts

  - name: restore-daily-coverage-tracked
    schedule: "0 3 * * *"
    env: docker
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
    command: python -m backend.scripts.run_task backend.tasks.market_data_tasks.bootstrap_daily_coverage_tracked --kwargs '{"history_days": 20, "history_batch_size": 25}'

  - name: monitor-coverage-health-hourly
    schedule: "0 * * * *"
    env: docker
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
    command: python -m backend.scripts.run_task backend.tasks.market_data_tasks.monitor_coverage_health

  - name: enforce-price-data-retention
    schedule: "0 4 * * *"
    env: docker
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: axiomfolio-redis
          property: connectionString
    command: python -m backend.scripts.run_task backend.tasks.market_data_tasks.enforce_price_data_retention
