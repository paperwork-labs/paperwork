services:
  - type: web
    name: axiomfolio-api
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /health
    autoDeploy: true
    # Render Docker services don't reliably inject env vars (fromDatabase/fromService)
    # for preDeployCommand, so migrations run at API startup instead. Alembic upgrade
    # is idempotent — if already at head it's a no-op.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: AUTO_MIGRATE_ON_STARTUP
        value: "true"
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: RATE_LIMIT_STORAGE_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString

  - type: worker
    name: axiomfolio-worker
    runtime: docker
    # Starter (2 GB RAM) — sufficient for nightly delta pipeline;
    # upgrade to Pro temporarily if running full snapshot_history rebuild
    plan: starter
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
    dockerCommand: celery -A backend.tasks.celery_app worker --beat -Q celery,account_sync,orders --loglevel=info --max-memory-per-child=750000 --concurrency=1

  - type: web
    name: axiomfolio-frontend
    runtime: static
    autoDeploy: true
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.axiomfolio.com/api/v1

  - type: keyvalue
    name: axiomfolio-redis
    plan: starter
    ipAllowList: []

  # Deploy policy: all services auto-deploy on commit to main (branch protection gates CI).
  # All scheduling is via Celery Beat (beat_schedule in celery_app.py).
  # Render cron jobs have been retired — they added cost (3 extra Docker builds)
  # and provided zero additional resilience (they just called .delay() to the worker).
  # Default schedules are seeded from backend/tasks/job_catalog.py.

databases:
  - name: axiomfolio-db
    plan: basic-1gb
