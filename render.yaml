services:
  - type: web
    name: axiomfolio-api
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /health
    autoDeploy: true
    # Render Docker services don't reliably inject env vars (fromDatabase/fromService)
    # for preDeployCommand, so migrations run at API startup instead. Alembic upgrade
    # is idempotent — if already at head it's a no-op.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: AUTO_MIGRATE_ON_STARTUP
        value: "true"
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: RATE_LIMIT_STORAGE_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString

  - type: worker
    name: axiomfolio-worker
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        fromDatabase:
          name: axiomfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: axiomfolio-redis
          property: connectionString
    dockerCommand: celery -A backend.tasks.celery_app worker --loglevel=info

  - type: web
    name: axiomfolio-frontend
    runtime: static
    autoDeploy: true
    buildCommand: cd frontend && rm -rf node_modules package-lock.json && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.axiomfolio.com/api/v1

  - type: keyvalue
    name: axiomfolio-redis
    plan: starter
    ipAllowList: []

  # Cron jobs are managed dynamically via the Render API.
  # The Admin Schedules UI (DB + Render sync) is the source of truth.
  # Default schedules are seeded from backend/tasks/job_catalog.py on deploy.

databases:
  - name: axiomfolio-db
    plan: basic-1gb
