# Render Blueprints — Production Infrastructure as Code
# https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo to Render, it auto-detects render.yaml.
# Database and Redis are provisioned via Neon and Upstash (not Render).

services:
  - type: web
    name: filefree-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: cd apis/filefree && pip install -r requirements.txt
    preDeployCommand: cd apis/filefree && alembic upgrade head
    startCommand: cd apis/filefree && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: FRONTEND_URL
        value: https://filefree.ai
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: launchfree-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: cd apis/launchfree && pip install -r requirements.txt
    startCommand: cd apis/launchfree && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_URL
        value: https://launchfree.ai
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Brain API — Paperwork Labs meta-product (consumer name TBD). Deploy in separate Render workspace if desired.
  - type: web
    name: brain-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./apis/brain/Dockerfile
    dockerContext: ./apis/brain
    preDeployCommand: alembic upgrade head
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BRAIN_API_SECRET
        sync: false
      - key: SECRETS_API_KEY
        sync: false
      - key: STUDIO_URL
        value: https://paperworklabs.com
      - key: FRONTEND_URL
        value: https://paperworklabs.com
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: MAX_ITERATIONS
        sync: false
