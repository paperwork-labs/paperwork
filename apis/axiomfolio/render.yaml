#
# This file used to define the AxiomFolio Render Blueprint while the
# service was being migrated into the monorepo. As of 2026-04-25 every
# Paperwork-managed Render service (FileFree, Brain, AxiomFolio API,
# AxiomFolio workers, AxiomFolio frontend, axiomfolio-redis,
# axiomfolio-db) is declared in the root /render.yaml. Render's Blueprint
# Sync expects exactly one render.yaml per repo; keeping a second one
# alive caused split-brain (the dashboard "New Blueprint" preview only
# showed services from whichever path you pointed it at, never both).
#
# To repoint Render at the consolidated blueprint:
#   1. Dashboard → Blueprints → New Blueprint
#   2. Repository: paperwork-labs/paperwork
#   3. Branch: main
#   4. Blueprint Path: render.yaml      ← the root file (the default)
#   5. Choose "Associate existing services" so axiomfolio-api,
#      axiomfolio-worker, axiomfolio-worker-heavy, axiomfolio-frontend,
#      axiomfolio-redis, and axiomfolio-db all attach to this Blueprint
#      instead of being orphaned by the old paperwork-labs/axiomfolio
#      repo pointer.
#
# Runbook with screenshots: docs/infra/RENDER_REPOINT.md
