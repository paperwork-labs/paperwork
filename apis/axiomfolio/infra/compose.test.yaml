services:
  postgres_test:
    image: postgres:16-alpine
    container_name: axiomfolio-test-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB}
      POSTGRES_USER: ${POSTGRES_TEST_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - axiomfolio_test_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis_test:
    image: redis:7.4-alpine
    container_name: axiomfolio-test-redis
    command: redis-server --appendonly no --requirepass ${REDIS_TEST_PASSWORD}
    networks:
      - axiomfolio_test_network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_TEST_PASSWORD}", "--raw", "PING" ]
      interval: 5s
      timeout: 3s
      retries: 10

  backend_test:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: axiomfolio-test-runner
    env_file:
      - ./env.test
    depends_on:
      postgres_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      # Forward CI signals so backend/tests/conftest.py::_in_ci() can detect
      # GitHub Actions and switch silent skip -> hard fail. Without this the
      # outer runner sets CI=true but the value never reaches the container,
      # which is the failure mode that hid broken migrations for 8 days
      # (PR #321 retrospective). Empty defaults keep local `make test` quiet.
      - CI=${CI:-}
      - GITHUB_ACTIONS=${GITHUB_ACTIONS:-}
      - GITHUB_RUN_ID=${GITHUB_RUN_ID:-}
    volumes:
      - ..:/app
      - /app/backend/__pycache__
    networks:
      - axiomfolio_test_network
    command: bash -lc "python -m pytest -c backend/pytest.ini backend/tests -v"

networks:
  axiomfolio_test_network:
    driver: bridge

volumes:
  postgres_test_data:
    driver: local
