# Track G — golden persona-pin regression fixtures.
#
# These capture the "realistic shape" of n8n → Brain calls that we
# migrated in Track H (cpa-tax-review, qa-security-scan, sprint-kickoff)
# plus the broader set of 16 PersonaSpecs. One scenario per persona so
# the matrix stays balanced; each scenario's expectations are a
# *structural* contract (default_model matches spec, compliance flag
# honoured, tools flag honoured) rather than a semantic assertion on
# the generated text.
#
# The regression test in test_persona_pin_golden.py:
#  1. Loads each scenario.
#  2. Looks up the PersonaSpec from the registry.
#  3. Asserts fixture ↔ spec agree on default_model / compliance_flagged
#     / requires_tools / proactive_cadence.
#  4. Fails loudly if a persona is missing or if a spec drifts from the
#     golden file, so "is my persona still routing the way I think it
#     is?" is a `pytest` run away from an answer.
#
# To refresh: run `pytest -q tests/test_persona_pin_golden.py`. When we
# add a new persona, add its scenario here or the coverage test fails.

scenarios:
  - id: cpa_tax_review
    persona: cpa
    message: "Run a CPA tax review on the latest filings and flag any Circular 230 issues."
    expected:
      default_model: claude-sonnet-4-20250514
      escalation_model: claude-opus-4-20250618
      compliance_flagged: true
      requires_tools: false
      proactive_cadence: weekly
      has_ceiling: true
      has_rate_limit: true

  - id: qa_security_scan
    persona: qa
    message: "Run a security audit on the latest PR and return critical_issues, high_issues, medium_issues, test_cases."
