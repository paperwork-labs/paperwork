# Procedural memory — Brain's "when X, do Y" rules
#
# Source: cheap-agent-fleet.mdc rule #6.
# Distilled from incident retros, post-merge review notes, and dispatch outcomes.
# Read by apis/brain/app/services/strategic_planner.py to bias workstream
# decomposition and agent dispatch (WS-64 self-improvement loop).
#
# Each rule has:
#   - id: snake_case unique
#   - when: trigger condition (free text + optional structured fields)
#   - do: action / preference (free text)
#   - source: where the rule came from (PR #, incident name, retro)
#   - learned_at: when added (RFC3339Z UTC)
#   - confidence: low | medium | high
#   - applies_to: list of [orchestrator, brain-self-dispatch, cheap-agents]
#
# This file is YAML to keep editing-by-human friendly while still machine-readable.

version: 1
rules:
  - id: ruff_format_pre_push_guard
    when: "ruff or format check is skipped before push; any cheap agent edits Python under apis/brain/ or scripts/"
    do: "agent must run `ruff format --check .` before push; orchestrator includes the guard in dispatch prompt"
    source: "PR #374 — Brain Tests CI failure on missing ruff format on tests/test_schedulers/test_misfire_grace.py"
    learned_at: "2026-04-28T22:30:00Z"
    confidence: high
    applies_to: [cheap-agents, brain-self-dispatch]

  - id: workstream_priority_unique
    when: "agent adds new entry to apps/studio/src/data/workstreams.json"
    do: "agent must select an unused priority; orchestrator validates via WorkstreamsFile.model_validate(); rebase queue catches collisions across parallel agents"
    source: "PR #372/373 rebase — WS-37/WS-39/WS-40 priority collisions with WS-41 in main"
    learned_at: "2026-04-28T23:30:00Z"
    confidence: high
    applies_to: [cheap-agents, orchestrator]

  - id: cancelled_status_estimated_pr_count_null
    when: "agent sets workstream status to 'cancelled'"
    do: "set estimated_pr_count to null (NOT 0 — schema rejects 0 via gt=0); set percent_done=0; document cancellation reason in notes"
    source: "PR #372 — WS-15 cancellation with epc=0 caused pydantic ValidationError"
    learned_at: "2026-04-28T23:30:00Z"
    confidence: high
    applies_to: [cheap-agents, brain-self-dispatch]

  - id: vercel_design_storybook_known_failure
    when: "Vercel - design check fails on a PR"
    do: "orchestrator does NOT block merge on this check; tracked as pre-existing rolldown/storybook 10/vite 8 incompatibility; will become Phase H Brain-self-prioritized work"
    source: "PR #374/#372/#373 — design storybook build fails with rolldown enhanced-resolve binding error"
    learned_at: "2026-04-28T23:00:00Z"
    confidence: high
    applies_to: [orchestrator]

  - id: medallion_tag_on_brain_service_files
    when: "agent creates or modifies a .py file under apis/brain/app/services/"
    do: "include 'medallion: ops' (or correct layer: bronze|silver|gold|execution|ops) in the module docstring; orchestrator runs `python3 scripts/medallion/check_imports.py --app-dir apis/brain --strict --stats` before push"
    source: "PR #377 (WS-45 kill_switch.py) and PR #380 (WS-65 procedural_memory.py) — apis/brain CI failed: 'missing medallion tag'; required round-trip fix commit each time"
    learned_at: "2026-04-29T00:00:00Z"
    confidence: high
    applies_to: [cheap-agents, brain-self-dispatch, orchestrator]

  - id: blast_radius_isolate_worktrees_for_parallel_dispatch
    when: "orchestrator dispatches multiple cheap agents in parallel that may touch overlapping files (admin.py, workstreams.json, shared data files)"
    do: "use `best-of-n-runner` (per-agent isolated git worktree) — never share the orchestrator's working tree across concurrent agents; otherwise race conditions surface as untracked files from sibling tasks"
    source: "Hour 0-3 blitz: WS-45 + WS-62 + WS-65 + blitz-orchestration ran in shared workspace; observed cross-branch untracked files; rebase queue caught the merge conflicts but not the workspace contention"
    learned_at: "2026-04-29T00:00:00Z"
    confidence: high
    applies_to: [orchestrator]

  - id: lighthouse_label_for_pr_perf_check
    when: "PR introduces web frontend changes (apps/* or packages/ui)"
    do: "add 'lighthouse' label to trigger Lighthouse-CI workflow on the preview deploy; orchestrator can label via gh pr edit --add-label lighthouse"
    source: "POS pillar 4 (web_perf_ux) — Lighthouse-CI runs only on labeled PRs to save CI minutes; main runs always collect"
    learned_at: "2026-04-29T01:00:00Z"
    confidence: high
    applies_to: [orchestrator, cheap-agents]

  - id: a11y_label_for_pr_axe_check
    when: "PR introduces user-facing UI changes (apps/* or packages/ui)"
    do: "add 'a11y' label to trigger axe-core workflow on the preview deploy; orchestrator can label via gh pr edit --add-label a11y"
    source: "POS pillar 5 (a11y_design_system) — axe runs only on labeled PRs to save CI minutes; main always runs"
    learned_at: "2026-04-29T02:00:00Z"
    confidence: high
    applies_to: [orchestrator, cheap-agents]

  - id: stack_audit_quarterly_refresh
    when: "POS pillar 3 (stack_modernity) reports audit_stale_days > 75"
    do: "open a WS-49 refresh PR (re-run the audit, update STACK_AUDIT_<year>-Q<quarter>.md, register in docs/_index.yaml)"
    source: "POS pillar 3 collector — quarterly refresh keeps stack-modernity score honest"
    learned_at: "2026-04-29T01:30:00Z"
    confidence: high
    applies_to: [orchestrator, brain-self-dispatch]

  - id: anomaly_alert_severity_threshold
    when: "an anomaly's |z-score| >= 3.5 sustains for >24h (high severity, unresolved)"
    do: "open a severity:high issue in linear/github (or append to apis/brain/data/incidents.json) and notify founder via Slack (#brain-asks); orchestrator should not auto-resolve without confirmation"
    source: "WS-50 anomaly detection implementation — Phase D Eyes+Voice"
    learned_at: "2026-04-28T02:21:00Z"
    confidence: medium
    applies_to: [brain-self-dispatch]

  - id: cloudflare_write_must_use_zone_resolver
    when: "agent or service writes to Cloudflare (DNS record mutation, cache purge, WAF rule)"
    do: "must call cloudflare_token_resolver.resolve_write_token(apex) or write_auth_headers(apex) — never use settings.CLOUDFLARE_API_TOKEN directly for write operations; pass the specific apex zone so the resolver picks the narrowest-scoped per-zone token; if per-zone token is absent the resolver falls back with a warning but the intent must always be zone-specific"
    source: "PR WS-47 — per-zone CF write tokens; reduces blast radius from account-wide token leak to single zone"
    learned_at: "2026-04-28T02:21:00Z"
    confidence: high
    applies_to: [cheap-agents, brain-self-dispatch, orchestrator]

  - id: dora_metrics_freshness_24h
    when: "POS pillar 2 (dora_elite) collector cannot reach `gh api`"
    do: "fallback to bootstrap estimate but tag the entry with measured=False and notes='gh CLI unavailable'; orchestrator should not block POS update"
    source: "POS pillar 2 collector — gh outages should not zero the score"
    learned_at: "2026-04-29T01:30:00Z"
    confidence: high
    applies_to: [orchestrator]

  - id: brain_data_dir_traverses_three_levels
    when: "a service file in apis/brain/app/services/X.py needs to compute the brain data dir path"
    do: "MUST traverse three dirname levels (services -> app -> brain) and join with 'data'; pattern os.path.dirname(os.path.dirname(os.path.dirname(__file__))) + '/data' OR Path(__file__).resolve().parents[2] / 'data'; doing only two levels lands at brain/app/data which is the WRONG location and silently writes runtime state to a data dir that no admin endpoint reads from. Verified-broken examples: operating_score.py (fixed PR #403), sprint_velocity.py (fixed in WS-51), pr_outcomes.py (fixed in fix/vercel-cost-bleed-stop)"
    source: "recurring path bug found in 3+ services; cheap agents copy the wrong pattern from peer files"
    learned_at: "2026-04-29T03:55:00Z"
    confidence: high
    applies_to: [cheap-agents, brain-self-dispatch, orchestrator]

  - id: vercel_monorepo_must_use_turbo_ignore
    when: "a Vercel project sits in apps/<name>/ inside the pnpm/turbo monorepo and its vercel.json has an ignoreCommand that does not call turbo-ignore"
    do: "the ignoreCommand MUST run turbo-ignore <pkg-name> --fallback=HEAD~10 (after the dependabot-skip prefix) so Vercel skips builds when neither the app nor any of its workspace dependencies changed; without turbo-ignore every commit to anywhere in the monorepo rebuilds every Vercel project, burning build minutes + on-demand spend. Caught: $36.58/$40 on-demand spend caused by 1000 studio rebuilds in 30 days when only ~80 actually changed studio code"
    source: "fix/vercel-cost-bleed-stop — Vercel on-demand budget hit 91% before any alert because every PR rebuilt all 8 apps"
    learned_at: "2026-04-29T03:55:00Z"
    confidence: high
    applies_to: [cheap-agents, brain-self-dispatch, orchestrator, founder]

  - id: cost_guards_must_alert_below_cap_not_at_cap
    when: "Brain or persona introduces a cost-bearing capability (LLM API, paid SaaS quota, infrastructure metered resource)"
    do: "the monitor MUST emit alerts at 50%, 75%, and 90% of the cap, NOT only at 100%; reaching 100% is too late — services pause or get rate-limited then. Use vercel_billing_monitor.evaluate_alerts() as the reference pattern. Each threshold dedups per billing cycle so we only get one alert per level per period."
    source: "Vercel on-demand budget hit 91% with zero prior warning — by-design failure of the existing alert-at-cap setting"
    learned_at: "2026-04-29T03:55:00Z"
    confidence: high
    applies_to: [orchestrator, brain-self-dispatch]

  - id: brain_must_act_as_opus_coach_for_recurring_failures
    when: "Brain detects a procedural-memory rule pattern matching a planned action (Opus dispatching agent, drafting plan, requesting merge), OR detects an outcome that triggered an existing rule"
    do: "Brain SHOULD surface the relevant rules to Opus before the action runs (pre-flight checklist), and SHOULD auto-distill recurring failure signatures into new procedural rules during weekly retro; concretely: (a) /api/v1/admin/coach/preflight endpoint returns rules matching {action_type, files_touched, persona, recent_pr_path_globs}; (b) Opus consults that endpoint as the first step of any non-trivial dispatch or merge; (c) self_improvement weekly retro identifies repeats (>=3 incidents same root cause) and proposes new rules; this is WS-67 Brain-coach pattern requested by founder during cost-bleed incident"
    source: "founder note: 'we building brain, brain could leverage your skills well while remembering to do this for you... how we make this what we just did become like a smart check or something'"
    learned_at: "2026-04-29T03:55:00Z"
    confidence: high
    applies_to: [brain-self-dispatch, orchestrator]
