[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "tests_lint"]

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["alembic"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "DTZ",
  "SIM",
  "RUF",
  "ARG",
  "PIE",
  "TCH",
  "PTH",
  "C4",
  "ISC",
  "Q",
  "A",
  "T20",
  "ERA",
]
# PTH: large os.path surface in tools/ingestion; migration to pathlib is a follow-up (not behavior).
ignore = ["PTH"]

[tool.ruff.lint.per-file-ignores]
"app/models/scheduler_run.py" = ["TC003"]  # SQLAlchemy resolves Mapped[datetime] at class body time
"app/models/secrets_intelligence.py" = ["TC003"]  # Mapped[uuid.UUID] / datetime need runtime symbols for ORM
"app/models/quota_snapshot.py" = ["TC003"]
"app/models/workstream_board.py" = ["TC003"]
"app/models/github_actions_quota_snapshot.py" = ["TC003"]
"app/schemas/procedural_memory.py" = ["TC003"]  # Pydantic resolves datetime at model validation time
"app/schemas/app_logs.py" = ["TC003"]  # Pydantic resolves datetime at model validation time
"app/routers/admin_logs.py" = ["TC001", "TC003"]  # FastAPI resolves AppLogEntry + datetime at request time
"app/schemas/self_merge.py" = ["TC003"]  # Pydantic resolves datetime at model validation time
"app/schemas/strategic_objectives.py" = ["TC003"]  # Pydantic resolves datetime at model validation time
"app/schemas/workstream_candidates.py" = ["TC003"]  # Pydantic resolves datetime at model validation time
"app/services/vercel_quota_monitor.py" = ["TC002"]  # AsyncSession used at runtime (SQLAlchemy session API)
"app/services/operating_score.py" = ["TC003"]  # collections.abc.Callable typing idiom matching pr_outcomes fences
"app/routers/**" = ["B008", "ARG001"]
"app/dependencies/**" = ["B008"]
"app/dependencies.py" = ["B008"]
"app/api/secrets.py" = ["B008"]  # FastAPI Depends() in route defaults (same pattern as routers)
"tests/**" = ["E501", "ARG001", "ARG002", "TC002", "TC003"]  # test mocks deserve long URL strings, unused mock-signature args, and runtime-typed sqlalchemy/datetime imports

[tool.mypy]
python_version = "3.13"
strict = true
disallow_untyped_defs = true
disallow_any_generics = true
warn_unused_ignores = true
warn_redundant_casts = true
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]
implicit_reexport = true
ignore_missing_imports = true
exclude = ["alembic", "alembic/.*"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = "conftest"
disallow_untyped_defs = false

# JSONB and legacy ORM fields: full generic args are a follow-up to JSON TypedDicts.
[[tool.mypy.overrides]]
module = "app.models.*"
disallow_any_generics = false

# Medallion 0.D: suppress legacy noise until per-module cleanup (do not add new code here).
[[tool.mypy.overrides]]
module = [
  "app.main",
  "app.mcp_server",
  "app.routers.admin",
  "app.routers.brain",
  "app.schedulers.cost_dashboard",
  "app.schedulers.data_deep_validator",
  "app.schedulers.proactive_cadence",
  "app.schedulers.qa_weekly_report",
  "app.schedulers.sprint_auto_logger",
  "app.services.agent",
  "app.services.continuous_learning",
  "app.services.embeddings",
  "app.services.entity_extraction",
  "app.services.llm",
  "app.services.memory",
  "app.services.observability",
  "app.services.router",
  "app.tools.memory_tools",
]
ignore_errors = true
