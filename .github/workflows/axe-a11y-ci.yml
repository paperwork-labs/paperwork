name: Axe a11y CI
on:
  pull_request:
    types: [labeled, synchronize, opened]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/axe-a11y-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/axe-a11y-ci.yml"

permissions:
  contents: write

jobs:
  axe:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'a11y') || contains(github.event.pull_request.labels.*.name, 'lighthouse')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm i -g @axe-core/cli@4.x puppeteer@23.x
      - name: Resolve URL
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            URL="https://studio.paperworklabs.com"
          else
            URL=$(gh pr view ${{ github.event.pull_request.number }} --json statusCheckRollup --jq '.statusCheckRollup[]? | select(.context // .name | tostring | startswith("Vercel - studio")) | .targetUrl' | head -1)
          fi
          echo "url=${URL:-https://studio.paperworklabs.com}" >> $GITHUB_OUTPUT
      - name: Run axe
        run: |
          mkdir -p /tmp/axe
          axe "${{ steps.target.outputs.url }}" --save /tmp/axe/result.json --exit || true
      - name: Persist summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AXE_TARGET_URL: ${{ steps.target.outputs.url }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          mkdir -p apis/brain/data
          python3 .github/scripts/axe_summary_to_brain.py
      - name: Commit summary back
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "brain-bot"
          git config user.email "brain@paperworklabs.com"
          git add apis/brain/data/axe_runs.json
          git diff --cached --quiet || (git commit -m "chore(brain): record axe-core run for POS pillar 5" && git push)
