name: Post-main regenerate indexes

# After each merge to main, refresh generated indexes so open PRs rebase onto
# a main that already matches CI expectations (reduces tracker/docs-index drift).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: post-main-regen-indexes
  cancel-in-progress: true

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip regen commits
        id: skip
        run: |
          msg="${{ github.event.head_commit.message }}"
          if echo "$msg" | grep -qF 'chore: regenerate indexes after merge'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.skip.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install Python deps for index scripts
        if: steps.skip.outputs.skip != 'true'
        run: pip install pyyaml

      - name: Regenerate tracker + docs index
        if: steps.skip.outputs.skip != 'true'
        run: |
          python3 scripts/generate_tracker_index.py --no-pr-fetch
          python3 scripts/generate_docs_index.py --write

      - name: Commit and push if drift
        if: steps.skip.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/studio/src/data/tracker-index.json docs/_index.yaml
          if git diff --staged --quiet; then
            echo "Indexes already fresh."
            exit 0
          fi
          git commit -m "chore: regenerate indexes after merge [skip ci]"
          git push
