name: CI

"on":
  pull_request:
    branches:
      - main
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.decide.outputs.backend }}
      frontend: ${{ steps.decide.outputs.frontend }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Path-filter is only meaningful for pull_request events. For push (main)
      # and workflow_dispatch we always want both jobs to run, since:
      #  - main pushes are the gate for auto-merge of agent PRs and must
      #    re-validate the full matrix even on docs-only commits.
      #  - workflow_dispatch is used for manual reruns and should be exhaustive.
      - name: Run path filter (pull_request only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'infra/**'
              - 'Dockerfile.backend'
              - 'docker-compose.test.yml'
              - 'infra/compose.test.yaml'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'alembic.ini'
              - 'backend/alembic.ini'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

      - name: Decide which jobs need real work
        id: decide
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          else
            # push to main / workflow_dispatch -> always run both
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

  backend-tests:
    name: Backend (pytest in docker)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare test env
        run: |
          cp infra/env.test.example infra/env.test

      - name: Start test stack (postgres_test, redis_test)
        run: make test-up

      - name: Python syntax check
        run: make test-syntax

      - name: Run backend tests (isolated postgres_test)
        run: make test

      - name: Migration chain integrity
        run: |
          docker compose --project-name axiomfolio_test --env-file infra/env.test \
            -f infra/compose.test.yaml run --rm --no-deps backend_test \
            python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          import os, sys
          cfg = Config(os.path.join('backend', 'alembic.ini'))
          cfg.set_main_option('script_location', os.path.join('backend', 'alembic'))
          script = ScriptDirectory.from_config(cfg)
          heads = script.get_heads()
          if len(heads) != 1:
              print(f'ERROR: Expected 1 migration head, found {len(heads)}: {heads}')
              sys.exit(1)
          revs = list(script.walk_revisions())
          print(f'OK: {len(revs)} migrations, single head: {heads[0]}')
          "

      - name: Tear down test stack
        if: always()
        run: |
          make test-down

  backend-tests-skipped:
    name: Backend (pytest in docker)
    needs: changes
    if: needs.changes.outputs.backend != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: No backend changes
        run: echo "No backend changes; skipping real tests."

  frontend-checks:
    name: Frontend (lint/typecheck/test)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests
        working-directory: frontend
        run: npm run test

  frontend-checks-skipped:
    name: Frontend (lint/typecheck/test)
    needs: changes
    if: needs.changes.outputs.frontend != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: No frontend changes
        run: echo "No frontend changes; skipping real checks."

  medallion-check:
    name: Medallion import-layer gate
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Run medallion-check
        run: make medallion-check

  medallion-check-sql:
    name: Iron Law #1 — append-only ledgers
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Run medallion-check-sql
        run: make medallion-check-sql
