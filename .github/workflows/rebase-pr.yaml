name: Rebase PR onto main

# Manual / Brain-dispatched rebase helper. Resolves common generated-file
# conflicts by regenerating tracker index, docs index, and lockfile when needed.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to rebase
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: rebase-pr-${{ github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  rebase:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node (pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Checkout PR branch and rebase
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh pr checkout "$PR_NUMBER"
          bash .github/scripts/rebase_pr_branch.sh
