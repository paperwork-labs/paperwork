name: Docs index drift

on:
  push:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "docs/_index.yaml"
      - "scripts/check_docs_index.py"
      - ".github/workflows/docs-index.yaml"
  pull_request:
    paths:
      - "docs/**/*.md"
      - "docs/_index.yaml"
      - "scripts/check_docs_index.py"
      - ".github/workflows/docs-index.yaml"

concurrency:
  group: docs-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install "pyyaml>=6.0"
      - run: python scripts/check_docs_index.py
