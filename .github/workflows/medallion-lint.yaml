name: Medallion lint (all backends)

on:
  push:
    branches: [main]
    paths:
      - "apis/**/*.py"
      - "scripts/medallion/**"
      - ".github/workflows/medallion-lint.yaml"
  pull_request:
    paths:
      - "apis/**/*.py"
      - "scripts/medallion/**"
      - ".github/workflows/medallion-lint.yaml"

concurrency:
  group: medallion-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      fail-fast: false
      matrix:
        app:
          - apis/axiomfolio
          - apis/brain
          - apis/filefree
          - apis/launchfree
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: python -m pip install "pyyaml>=6.0"
      - name: Run medallion import gate
        run: python scripts/medallion/check_imports.py --app-dir ${{ matrix.app }} --stats
