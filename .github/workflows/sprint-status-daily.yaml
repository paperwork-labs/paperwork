name: Sprint status reconciliation (daily)

# Verifies `tracker-index.json` `effective_status` matches
# `apps/studio` `computeEffectiveSprintStatus` (kept in lockstep with
# `generate_tracker_index.py`).

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: sprint-status-daily
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version: "20"
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e
        with:
          version: 10
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: TS audit vs tracker JSON
        run: pnpm exec tsx scripts/sprints/normalize-statuses.ts --check
