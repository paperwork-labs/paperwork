# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🚀 AxiomFolio V1 - Continuous Deployment

"on":
  workflow_run:
    workflows: ["🧪 AxiomFolio V1 - Continuous Integration"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      force_deploy:
        description: 'Force deployment even if tests failed'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: axiomfolio

jobs:
  # Pre-deployment validation
  validate:
    name: 🔍 Pre-deployment Validation
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: 🔍 Validate deployment readiness
        run: |
          echo "🔍 Checking deployment prerequisites..."
          echo "✅ Source code checkout complete"
          echo "✅ Workflow validation passed"
  
  # Build and push Docker images
  build:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      backend-image: ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }}
      frontend-image: ghcr.io/${{ github.repository }}/frontend:sha-${{ github.sha }}
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📝 Extract metadata for backend
        id: backend-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: 🏗️ Build and push backend image
        id: backend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
      
      - name: 📝 Extract metadata for frontend
        id: frontend-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: 🏗️ Build and push frontend image
        id: frontend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}

  # Deploy to staging
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: 
      name: staging
      url: https://staging.axiomfolio.com
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: 🚀 Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Backend image: ${{ needs.build.outputs.backend-image }}"
          echo "Frontend image: ${{ needs.build.outputs.frontend-image }}"
          
          # Add your staging deployment commands here
          # For example, kubectl, docker-compose, or cloud provider CLI commands
          
          echo "✅ Staging deployment completed"

      - name: 🗄️ Run DB migrations (staging)
        if: ${{ secrets.DATABASE_URL_STAGING != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          docker run --rm -e DATABASE_URL="$DATABASE_URL" "${{ needs.build.outputs.backend-image }}" alembic -c backend/alembic.ini upgrade head

      - name: 🚀 Trigger Render deploy (staging)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING != '' }}
        env:
          RENDER_DEPLOY_HOOK_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
        run: |
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_STAGING"

      - name: 🛫 Setup Flyctl
        if: ${{ secrets.FLY_API_TOKEN != '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 🛫 Deploy Fly apps (staging)
        if: ${{ secrets.FLY_API_TOKEN != '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend-image }}
        run: |
          if [ -n "${{ secrets.FLY_APP_API_STAGING }}" ]; then
            flyctl deploy --config fly.backend.toml --image "$BACKEND_IMAGE" --app "${{ secrets.FLY_APP_API_STAGING }}"
          fi
          if [ -n "${{ secrets.FLY_APP_WORKER_STAGING }}" ]; then
            flyctl deploy --config fly.worker.toml --image "$BACKEND_IMAGE" --app "${{ secrets.FLY_APP_WORKER_STAGING }}"
          fi
          if [ -n "${{ secrets.FLY_APP_CRON_STAGING }}" ]; then
            flyctl deploy --config fly.cron.toml --image "$BACKEND_IMAGE" --app "${{ secrets.FLY_APP_CRON_STAGING }}"
          fi
      
      - name: 🧪 Run staging smoke tests
        run: |
          echo "🧪 Running staging smoke tests..."
          # Add staging validation tests here
          curl -f https://staging.axiomfolio.com/health || exit 1
          echo "✅ Staging smoke tests passed"

  # Deploy to production (manual approval required)
  deploy-production:
    name: 🎯 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: 
      name: production
      url: https://axiomfolio.com
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: 🎯 Deploy to production
        run: |
          echo "🎯 Deploying to production environment..."
          echo "Backend image: ${{ needs.build.outputs.backend-image }}"
          echo "Frontend image: ${{ needs.build.outputs.frontend-image }}"
          
          # Add your production deployment commands here
          # For example, kubectl, docker-compose, or cloud provider CLI commands
          
          echo "✅ Production deployment completed"

      - name: 🗄️ Run DB migrations (production)
        if: ${{ secrets.DATABASE_URL_PRODUCTION != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          docker run --rm -e DATABASE_URL="$DATABASE_URL" "${{ needs.build.outputs.backend-image }}" alembic -c backend/alembic.ini upgrade head

      - name: 🎯 Trigger Render deploy (production)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION != '' }}
        env:
          RENDER_DEPLOY_HOOK_PRODUCTION: ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}
        run: |
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_PRODUCTION"

      - name: 🛫 Setup Flyctl
        if: ${{ secrets.FLY_API_TOKEN != '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 🛫 Deploy Fly apps (production)
        if: ${{ secrets.FLY_API_TOKEN != '' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend-image }}
        run: |
          if [ -n "${{ secrets.FLY_APP_API_PRODUCTION }}" ]; then
            flyctl deploy --config fly.backend.toml --image "$BACKEND_IMAGE" --app "${{ secrets.FLY_APP_API_PRODUCTION }}"
          fi
          if [ -n "${{ secrets.FLY_APP_WORKER_PRODUCTION }}" ]; then
            flyctl deploy --config fly.worker.toml --image "$BACKEND_IMAGE" --app "${{ secrets.FLY_APP_WORKER_PRODUCTION }}"
          fi
          if [ -n "${{ secrets.FLY_APP_CRON_PRODUCTION }}" ]; then
            flyctl deploy --config fly.cron.toml --image "$BACKEND_IMAGE" --app "${{ secrets.FLY_APP_CRON_PRODUCTION }}"
          fi
      
      - name: 🧪 Run production smoke tests
        run: |
          echo "🧪 Running production smoke tests..."
          # Add production validation tests here
          curl -f https://axiomfolio.com/health || exit 1
          echo "✅ Production smoke tests passed"
      
      - name: 📢 Notify deployment success
        run: |
          echo "📢 Production deployment successful!"
          # Add notification logic here (Slack, Discord, etc.)

  # Rollback capability
  rollback:
    name: 🔄 Rollback
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure')
    needs: [deploy-staging, deploy-production]
    
    steps:
      - name: 🔄 Rollback deployment
        run: |
          echo "🔄 Rolling back deployment due to failure..."
          # Add rollback logic here
          echo "✅ Rollback completed" 