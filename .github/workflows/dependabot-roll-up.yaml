name: Dependabot weekly rollup

# Groups open Dependabot PRs by ecosystem (npm, pip, github-actions, docker)
# into one rolled-up PR per week. Security-labeled PRs are excluded (they are
# merged immediately by auto-merge-sweep). See .github/scripts/dependabot_rollup.py

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-rollup
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node (pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Python (pip rollups)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run rollup script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/dependabot_rollup.py
