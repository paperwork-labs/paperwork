name: Vercel auto-promote on merge

# Why this workflow exists
# ------------------------
# Vercel's GitHub App webhook missed two consecutive merges to `main`
# (PR #142 → commit f0255542, PR #143 → commit 83477e70). That left
# production stuck on stale builds while previews were green. The fix
# pattern was always the same: manually `vercel promote <preview-id>` —
# which doesn't burn a build slot, just flips the prod alias.
#
# This workflow automates that fix as a redundant trigger:
#
#   1. PR merges to `main`.
#   2. We find the latest READY preview deployment for the PR's head SHA.
#   3. We promote it to production via Vercel's API (no rebuild).
#   4. We comment on the PR so the audit log shows what happened.
#
# Properties:
#   • No new builds → no Vercel free-tier daily-limit pressure.
#   • Independent of Vercel's webhook delivery → if the webhook landed
#     and prod is already on this SHA, we exit cleanly (idempotent).
#   • Works for any project that has a linked `.vercel/project.json`
#     in the repo. Matrix lists all Paperwork Labs Vercel apps.
#
# Setup (one-time, see docs/infra/VERCEL_AUTO_PROMOTE.md):
#   gh secret set VERCEL_API_TOKEN  # from Vercel → Settings → Tokens
#
# SHA gotcha (lesson from PR #156, 2026-04-25):
#   For squash-merged PRs, Vercel builds the *merge commit* SHA on `main`,
#   not the PR's branch HEAD SHA. Always resolve `pull_request.merge_commit_sha`
#   first; fall back to `head.sha` only when the merge SHA is unavailable
#   (e.g. workflow_dispatch on an open PR). The "Find READY preview" step
#   tries both for safety.
#
# Tracked in: docs/sprints/INFRA_AUTOMATION_HARDENING_2026Q2.md

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to promote (manual fallback)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: studio
            project_id: prj_FZvJJnDdQqawjBpJAwC0SuwyMzFT
          - project: filefree
            project_id: prj_DNPGX5GrYcwer9oANv90NKqIT67I
          - project: distill
            project_id: prj_1TKlkMmY3vLVNfAfRxUY57z43m11
          - project: launchfree
            project_id: prj_hXQNtz5g7IAwx8lvCkODWxOyHcP7
          - project: axiomfolio-next
            project_id: TBD_CREATE_BEFORE_MERGE
          - project: trinkets
            project_id: TBD_CREATE_BEFORE_MERGE
          - project: design
            project_id: TBD_CREATE_BEFORE_MERGE
          - project: accounts
            project_id: TBD_CREATE_BEFORE_MERGE
          - project: design
            project_id: TBD_CREATE_BEFORE_MERGE
    env:
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      TEAM_ID: team_RwfzJ9ySyLuVcoWdKJfXC7h5
      PROJECT_ID: ${{ matrix.project_id }}
      PROJECT_NAME: ${{ matrix.project }}
    steps:
      - name: Verify Vercel API token configured
        run: |
          if [ -z "$VERCEL_API_TOKEN" ]; then
            echo "::warning::VERCEL_API_TOKEN secret is not set — skipping promote."
            echo "::warning::Set it via: gh secret set VERCEL_API_TOKEN"
            echo "::warning::See docs/infra/VERCEL_AUTO_PROMOTE.md for setup."
            exit 0
          fi
          echo "secret_ok=true" >> $GITHUB_ENV

      - name: Skip if project_id placeholder
        if: env.secret_ok == 'true' && matrix.project_id == 'TBD_CREATE_BEFORE_MERGE'
        continue-on-error: true
        run: |
          echo "::notice::Skipped — ${{ matrix.project }} has no Vercel project_id yet (placeholder TBD_CREATE_BEFORE_MERGE)."
          echo "Create the project in Vercel, then replace the placeholder in .github/workflows/vercel-promote-on-merge.yaml."
          echo "See docs/infra/FOUNDER_ACTIONS.md."
          exit 0

      - name: Resolve PR merge commit SHA
        id: pr
        if: env.secret_ok == 'true' && matrix.project_id != 'TBD_CREATE_BEFORE_MERGE'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          # IMPORTANT: For a squash-merged PR, Vercel builds the *merge commit*
          # SHA that landed on `main` — NOT the PR branch's last head SHA.
          # We resolve `merge_commit_sha` first; fall back to `head.sha` only
          # for non-merge invocations (e.g. workflow_dispatch on an open PR).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            PR_JSON=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER")
            PR_MERGE=$(echo "$PR_JSON" | jq -r '.merge_commit_sha // ""')
            PR_HEAD_FALLBACK=$(echo "$PR_JSON" | jq -r '.head.sha')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_MERGE="${{ github.event.pull_request.merge_commit_sha }}"
            PR_HEAD_FALLBACK="${{ github.event.pull_request.head.sha }}"
            PR_TITLE='${{ github.event.pull_request.title }}'
          fi
          if [ -n "$PR_MERGE" ] && [ "$PR_MERGE" != "null" ]; then
            PR_HEAD="$PR_MERGE"
            echo "Using merge_commit_sha: $PR_HEAD"
          else
            PR_HEAD="$PR_HEAD_FALLBACK"
            echo "::warning::No merge_commit_sha available, falling back to head.sha: $PR_HEAD"
          fi
          echo "Resolved PR #$PR_NUMBER target SHA: $PR_HEAD"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_head=$PR_HEAD" >> $GITHUB_OUTPUT
          echo "pr_head_fallback=$PR_HEAD_FALLBACK" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT

      - name: Relevant paths for this app
        id: paths
        if: env.secret_ok == 'true' && matrix.project_id != 'TBD_CREATE_BEFORE_MERGE'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          PREFIX="apps/${{ matrix.project }}/"
          FILES=$(gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" --name-only 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "::warning::Could not list files for PR #$PR_NUMBER — continuing (treat as relevant)."
            echo "paths_relevant=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          relevant=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              "${PREFIX}"*) relevant=true; break ;;
              packages/*) relevant=true; break ;;
              pnpm-lock.yaml) relevant=true; break ;;
              package.json) relevant=true; break ;;
            esac
          done <<< "$FILES"
          if [ "$relevant" != "true" ]; then
            echo "::warning::PR #$PR_NUMBER did not touch $PREFIX, packages/**, pnpm-lock.yaml, or root package.json — skipping ${{ matrix.project }} promote job."
            echo "paths_relevant=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "paths_relevant=true" >> $GITHUB_OUTPUT

      - name: Check if production already on this SHA (idempotency)
        id: check
        if: env.secret_ok == 'true' && matrix.project_id != 'TBD_CREATE_BEFORE_MERGE' && steps.paths.outputs.paths_relevant == 'true'
        env:
          PR_HEAD: ${{ steps.pr.outputs.pr_head }}
        run: |
          set -euo pipefail
          lc() { printf '%s' "$1" | tr '[:upper:]' '[:lower:]'; }
          same_sha() {
            local a b
            a=$(lc "$1")
            b=$(lc "$2")
            [ -n "$a" ] && [ -n "$b" ] || return 1
            [ "$a" = "$b" ] && return 0
            [ "${a:0:7}" = "${b:0:7}" ] && return 0
            return 1
          }
          HTTP_CODE=$(curl -sS -o /tmp/prod-dep.json -w "%{http_code}" -H "Authorization: Bearer $VERCEL_API_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&teamId=$TEAM_ID&target=production&limit=1&state=READY")
          if [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Failed to read production deployment for $PROJECT_NAME (HTTP $HTTP_CODE)."
            head -c 4000 /tmp/prod-dep.json || true
            echo
            exit 1
          fi
          PROD_SHA=$(jq -r '.deployments[0].meta.githubCommitSha // ""' /tmp/prod-dep.json)
          echo "Current prod SHA for $PROJECT_NAME: $PROD_SHA"
          echo "Target SHA: $PR_HEAD"
          if same_sha "$PROD_SHA" "$PR_HEAD"; then
            echo "Production already on target SHA — webhook fired correctly. Nothing to do."
            echo "already_promoted=true" >> $GITHUB_OUTPUT
          else
            echo "already_promoted=false" >> $GITHUB_OUTPUT
          fi

      - name: Find READY preview deployment for PR head
        id: find
        if: env.secret_ok == 'true' && matrix.project_id != 'TBD_CREATE_BEFORE_MERGE' && steps.paths.outputs.paths_relevant == 'true' && steps.check.outputs.already_promoted == 'false'
        env:
          PR_HEAD: ${{ steps.pr.outputs.pr_head }}
          PR_HEAD_FALLBACK: ${{ steps.pr.outputs.pr_head_fallback }}
        run: |
          set -euo pipefail
          # Prefer meta-githubCommitSha API filter, then scan recent READY deployments with
          # fuzzy SHA match (full 40-char or matching 7-char prefix). Vercel may lag several
          # minutes before a main push produces a READY deployment; fail the job if none
          # exists so merges do not look green while production is stuck.
          curl_deployments() {
            local url="$1" out="$2"
            local code
            code=$(curl -sS -o "$out" -w "%{http_code}" -H "Authorization: Bearer ${VERCEL_API_TOKEN}" "$url")
            if [ -z "$code" ] || [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "::error::Vercel deployments API failed (HTTP ${code}) for URL query (project=$PROJECT_NAME). Body (truncated):"
              head -c 4000 "$out" || true
              echo
              exit 1
            fi
          }
          pick_from_meta_filter() {
            local sha="$1"
            if [ -z "$sha" ]; then echo ""; return 0; fi
            local url="https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&state=READY&limit=10&meta-githubCommitSha=${sha}"
            curl_deployments "$url" /tmp/vmeta.json
            jq -r '[.deployments[]? | select(.readyState == "READY")] | sort_by(.createdAt) | reverse | first | .uid // empty' /tmp/vmeta.json
          }
          pick_from_full_list() {
            curl_deployments "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&state=READY&limit=100" /tmp/vlist.json
            jq -r --arg MERGE "$PR_HEAD" --arg HEAD "$PR_HEAD_FALLBACK" '
              def norm(s): (s // "") | ascii_downcase;
              def cand(d): norm(d.meta.githubCommitSha // d.meta.commitSha // (d.gitSource.sha? // ""));
              def sameref(m; r):
                (m != "" and r != "" and (m == r or m[0:7] == r[0:7]));
              [.deployments[]? | select(.readyState == "READY")
                | select(sameref(cand(.); ($MERGE|norm)) or sameref(cand(.); ($HEAD|norm)))]
              | sort_by(.createdAt) | reverse | first | .uid // empty
            ' /tmp/vlist.json
          }
          DEPLOY_ID=""
          for attempt in $(seq 1 15); do
            echo "Attempt $attempt / 15: READY deployment for merge=$PR_HEAD head=$PR_HEAD_FALLBACK ($PROJECT_NAME)"
            for SHA_TRY in "$PR_HEAD" "$PR_HEAD_FALLBACK"; do
              CAND="$(pick_from_meta_filter "$SHA_TRY")"
              if [ -n "$CAND" ]; then DEPLOY_ID="$CAND"; break; fi
            done
            if [ -z "$DEPLOY_ID" ]; then
              DEPLOY_ID="$(pick_from_full_list)"
            fi
            if [ -n "$DEPLOY_ID" ]; then
              echo "Found deployment: $DEPLOY_ID"
              break
            fi
            echo "No READY deployment with this SHA yet; sleeping 30s."
            sleep 30
          done
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::No READY Vercel deployment for **${PROJECT_NAME}** matching merge_commit_sha=${PR_HEAD} or head_sha=${PR_HEAD_FALLBACK} after 15 attempts (~7.5 min). Promote only aliases an existing deployment — it cannot create one. Typical causes: Vercel never built this app for that commit (monorepo ignoreCommand / dashboard skip), deployment still BUILDING, or Hobby rate limits. Check Deployments in the Vercel dashboard; merge a no-op change to apps/${PROJECT_NAME}/.deploy-trigger or run \`vercel deploy --prod\` from apps/${PROJECT_NAME} if needed."
            exit 1
          fi
          echo "found_preview=true" >> $GITHUB_OUTPUT
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Promote to production
        id: promote
        if: env.secret_ok == 'true' && matrix.project_id != 'TBD_CREATE_BEFORE_MERGE' && steps.paths.outputs.paths_relevant == 'true' && steps.check.outputs.already_promoted == 'false' && steps.find.outputs.found_preview == 'true'
        env:
          DEPLOY_ID: ${{ steps.find.outputs.deploy_id }}
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -X POST -H "Authorization: Bearer $VERCEL_API_TOKEN" \
            -o /tmp/vercel-promote-response.json -w "%{http_code}" \
            "https://api.vercel.com/v10/projects/$PROJECT_ID/promote/$DEPLOY_ID?teamId=$TEAM_ID")
          echo "Vercel promote HTTP status: $HTTP_CODE"
          echo "Vercel promote response body:"
          cat /tmp/vercel-promote-response.json
          echo
          if [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Vercel promote API failed (HTTP $HTTP_CODE). Response body is printed above."
            exit 1
          fi
          echo "url=https://vercel.com/paperwork-labs/$PROJECT_NAME/$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Promoted $DEPLOY_ID to production for $PROJECT_NAME (no rebuild)."

      - name: Comment on PR
        if: env.secret_ok == 'true' && matrix.project_id != 'TBD_CREATE_BEFORE_MERGE' && github.event_name == 'pull_request' && steps.paths.outputs.paths_relevant == 'true' && (steps.check.outputs.already_promoted == 'true' || steps.find.outputs.found_preview == 'true')
        uses: actions/github-script@v9
        with:
          script: |
            const alreadyPromoted = '${{ steps.check.outputs.already_promoted }}' === 'true';
            const project = '${{ env.PROJECT_NAME }}';
            const deployId = '${{ steps.find.outputs.deploy_id }}';
            const promoteUrl = '${{ steps.promote.outputs.url }}';
            const prNumber = ${{ steps.pr.outputs.pr_number }};

            const body = alreadyPromoted
              ? `Vercel webhook fired correctly for **${project}** — production already on this SHA.`
              : `Auto-promoted preview \`${deployId}\` to **${project}** production (no rebuild).\n\n` +
                `${promoteUrl}\n\n` +
                `_This is the redundant trigger from \`.github/workflows/vercel-promote-on-merge.yaml\` — your Vercel webhook may have missed this merge._`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
