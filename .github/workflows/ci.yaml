name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      filefreeApi: ${{ steps.filter.outputs.filefreeApi }}
      launchfreeApi: ${{ steps.filter.outputs.launchfreeApi }}
      brainApi: ${{ steps.filter.outputs.brainApi }}
      filefreeWeb: ${{ steps.filter.outputs.filefreeWeb }}
      launchfreeWeb: ${{ steps.filter.outputs.launchfreeWeb }}
      studioWeb: ${{ steps.filter.outputs.studioWeb }}
      trinketsWeb: ${{ steps.filter.outputs.trinketsWeb }}
      distillWeb: ${{ steps.filter.outputs.distillWeb }}
      sharedPackages: ${{ steps.filter.outputs.sharedPackages }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            filefreeApi:
              - 'apis/filefree/**'
            launchfreeApi:
              - 'apis/launchfree/**'
            brainApi:
              - 'apis/brain/**'
              - '.cursor/rules/**'
            filefreeWeb:
              - 'apps/filefree/**'
            launchfreeWeb:
              - 'apps/launchfree/**'
            studioWeb:
              - 'apps/studio/**'
            trinketsWeb:
              - 'apps/trinkets/**'
            distillWeb:
              - 'apps/distill/**'
            sharedPackages:
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            infra:
              - 'infra/**'
              - 'Makefile'
              - '.github/workflows/**'

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-lint:
    name: API Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.filefreeApi == 'true' || needs.changes.outputs.sharedPackages == 'true' || needs.changes.outputs.infra == 'true'
    defaults:
      run:
        working-directory: apis/filefree
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check . --exclude alembic
      - run: ruff format --check . --exclude alembic

  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [changes, api-lint]
    if: needs.changes.outputs.filefreeApi == 'true' || needs.changes.outputs.sharedPackages == 'true' || needs.changes.outputs.infra == 'true'
    defaults:
      run:
        working-directory: apis/filefree
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: filefree
          POSTGRES_PASSWORD: test
          POSTGRES_DB: filefree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U paperwork"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://filefree:test@localhost:5432/filefree_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest --tb=short -q

  data-validate:
    name: Data Package Validate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sharedPackages == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check (src + scripts)
        run: pnpm typecheck
        working-directory: packages/data
      - name: Unit + integration tests
        run: pnpm test
        working-directory: packages/data
      - name: Review CLI (sanity checks)
        run: pnpm review
        working-directory: packages/data

  api-launchfree-lint:
    name: LaunchFree API Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.launchfreeApi == 'true' || needs.changes.outputs.sharedPackages == 'true' || needs.changes.outputs.infra == 'true'
    defaults:
      run:
        working-directory: apis/launchfree
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: python -m compileall app

  brain-persona-coverage:
    name: Brain Persona Coverage
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.brainApi == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install pydantic pyyaml
        working-directory: apis/brain
      - name: Check persona router / spec / .mdc invariants
        run: python apis/brain/scripts/check_persona_coverage.py

  brain-test:
    name: Brain Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.brainApi == 'true' || needs.changes.outputs.infra == 'true'
    defaults:
      run:
        working-directory: apis/brain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: python -m pytest --tb=short -q

  web-lint:
    name: Web Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.filefreeWeb == 'true' || needs.changes.outputs.launchfreeWeb == 'true' || needs.changes.outputs.studioWeb == 'true' || needs.changes.outputs.trinketsWeb == 'true' || needs.changes.outputs.distillWeb == 'true' || needs.changes.outputs.sharedPackages == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @paperwork-labs/filefree exec tsc --noEmit
      - run: pnpm --filter @paperwork-labs/launchfree exec tsc --noEmit
      - run: pnpm --filter @paperwork-labs/trinkets exec tsc --noEmit
      - run: pnpm --filter @paperwork-labs/studio exec tsc --noEmit
      - run: pnpm --filter @paperwork-labs/distill exec tsc --noEmit

  web-test:
    name: FileFree Web Tests
    runs-on: ubuntu-latest
    needs: [changes, web-lint]
    if: needs.changes.outputs.filefreeWeb == 'true' || needs.changes.outputs.sharedPackages == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        working-directory: apps/filefree

  web-build:
    name: Web Build Matrix
    runs-on: ubuntu-latest
    needs: [changes, web-lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: "@paperwork-labs/filefree"
            when: filefreeWeb
          - app: "@paperwork-labs/launchfree"
            when: launchfreeWeb
          - app: "@paperwork-labs/trinkets"
            when: trinketsWeb
          - app: "@paperwork-labs/studio"
            when: studioWeb
          - app: "@paperwork-labs/distill"
            when: distillWeb
    if: needs.changes.outputs.filefreeWeb == 'true' || needs.changes.outputs.launchfreeWeb == 'true' || needs.changes.outputs.studioWeb == 'true' || needs.changes.outputs.trinketsWeb == 'true' || needs.changes.outputs.distillWeb == 'true' || needs.changes.outputs.sharedPackages == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.app }} build
