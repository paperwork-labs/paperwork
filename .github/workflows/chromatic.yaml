name: Chromatic visual regression

# Visual regression for the apps/design Storybook 10 canvas.
# Builds Storybook on each PR that touches design tokens or stories,
# publishes to Chromatic, and posts a GitHub check with any visual diffs.
#
# Gracefully no-ops when CHROMATIC_PROJECT_TOKEN is not set
# (e.g., on fork PRs or before the founder creates the Chromatic project).
# See docs/infra/CHROMATIC_VRT.md for setup + triage.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "apps/design/**"
      - "packages/**/src/**"
      - ".github/workflows/chromatic.yaml"

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    # Do not use `if: secrets.*` on the publish step (schema); detect token via step output instead.
    env:
      # 4 GiB headroom for the Storybook build on 30+ stories with theme variants.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6
        with:
          # Chromatic needs full git history to compute baselines via TurboSnap.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter @paperwork-labs/design build-storybook

      - name: Detect Chromatic project token
        id: chromatic_token
        run: |
          if [ -n "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Chromatic publish (CHROMATIC_PROJECT_TOKEN not set). Storybook build still verified above."
          fi

      - name: Publish to Chromatic
        if: steps.chromatic_token.outputs.publish == 'true'
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/design
          storybookBuildDir: storybook-static
          onlyChanged: true
          exitZeroOnChanges: true
          autoAcceptChanges: "main"
