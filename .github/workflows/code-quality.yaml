name: Code quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  structural:
    name: Structural repo checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify stories live under apps/design/ only
        run: node scripts/verify-no-stories-in-packages.mjs
      - name: Verify vercel.json canonical install pattern
        run: node scripts/verify-vercel-json-canon.mjs

  lockfile-gate:
    name: pnpm-lock.yaml in sync with workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Enable corepack + activate pnpm (version from root package.json)
        # Must run BEFORE actions/setup-node so its package-manager-cache step
        # can find a working `pnpm` on PATH.
        run: |
          corepack enable
          corepack prepare "pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]")" --activate
          pnpm --version
      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: pnpm
      - name: Fail if pnpm-lock.yaml drifts from package.json
        run: pnpm install --frozen-lockfile --ignore-scripts
