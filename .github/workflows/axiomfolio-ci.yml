name: AxiomFolio CI

# Runs on changes under apis/axiomfolio/ or apps/axiomfolio/ (or the shared
# dev-stack compose). Uses the unified root compose (infra/compose.dev.yaml)
# for backend tests; frontend checks run natively via npm.
#
# See docs/INFRA.md for the architecture.

"on":
  pull_request:
    branches: [main]
    paths:
      - "apis/axiomfolio/**"
      - "packages/auth-clerk/src/python/**"
      - "apps/axiomfolio/**"
      - "infra/compose.dev.yaml"
      - "infra/init-test-db.sh"
      - "infra/env.dev.defaults"
      - "infra/axiomfolio/**"
      - ".github/workflows/axiomfolio-ci.yml"
  push:
    branches: [main]
    paths:
      - "apis/axiomfolio/**"
      - "packages/auth-clerk/src/python/**"
      - "apps/axiomfolio/**"
      - "infra/compose.dev.yaml"
      - "infra/init-test-db.sh"
      - "infra/env.dev.defaults"
      - "infra/axiomfolio/**"
      - ".github/workflows/axiomfolio-ci.yml"
  workflow_dispatch:

concurrency:
  group: axiomfolio-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# `dorny/paths-filter` needs pull-requests:read to diff against the PR base.
# The default GITHUB_TOKEN only gets contents:read on repos that opted into
# restricted token permissions (which this one did), so we grant it here.
permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed paths (axiomfolio)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.decide.outputs.backend }}
      frontend: ${{ steps.decide.outputs.frontend }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run path filter (pull_request only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            backend:
              - 'apis/axiomfolio/app/**'
              - 'apis/axiomfolio/Dockerfile'
              - 'packages/auth-clerk/src/python/**'
              - 'apis/axiomfolio/requirements*.txt'
              - 'apis/axiomfolio/pyproject.toml'
              - 'apis/axiomfolio/Makefile'
              - 'apis/axiomfolio/scripts/**'
              - 'infra/compose.dev.yaml'
              - 'infra/init-test-db.sh'
              - 'infra/env.dev.defaults'
              - 'infra/axiomfolio/**'
              - '.github/workflows/axiomfolio-ci.yml'
            frontend:
              - 'apps/axiomfolio/**'
              - '.github/workflows/axiomfolio-ci.yml'

      - name: Decide which jobs need real work
        id: decide
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          else
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

  backend-tests:
    name: AxiomFolio backend (pytest against shared stack)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    # Heavy: docker compose (postgres + redis) + pytest + alembic head check.
    # Frontend stays on Hetzner; backend remains on ubuntu-latest: Docker on
    # self-hosted intermittently bind-mounts the postgres init script as a
    # directory inside the container ("Is a directory"), breaking initdb.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Stub .env.secrets (compose expects the file to exist)
        run: touch .env.secrets

      - name: Boot shared postgres + redis
        working-directory: infra
        run: |
          set -euo pipefail
          docker compose -f compose.dev.yaml up -d postgres redis
          # Wait for postgres to accept connections and init-test-db.sh to run.
          ready=false
          for i in $(seq 1 30); do
            if docker compose -f compose.dev.yaml exec -T postgres \
                pg_isready -U paperwork -d axiomfolio_test >/dev/null 2>&1; then
              echo "postgres ready"; ready=true; break
            fi
            echo "waiting for postgres... ($i/30)"; sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "::error::postgres never became ready; dumping logs"
            docker compose -f compose.dev.yaml logs postgres
            exit 1
          fi

      - name: Run axiomfolio backend tests (axiomfolio_test DB)
        working-directory: apis/axiomfolio
        run: make test

      - name: Postgres logs on failure
        if: failure()
        working-directory: infra
        run: docker compose -f compose.dev.yaml logs postgres redis || true

      - name: Migration chain integrity
        working-directory: apis/axiomfolio
        run: |
          docker compose --project-name paperwork \
            -f ../../infra/compose.dev.yaml \
            run --rm --no-deps \
            -e DATABASE_URL=postgresql://paperwork:paperwork_dev@postgres:5432/axiomfolio_test \
            api-axiomfolio python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          import os, sys
          cfg = Config(os.path.join('app', 'alembic.ini'))
          cfg.set_main_option('script_location', os.path.join('app', 'alembic'))
          script = ScriptDirectory.from_config(cfg)
          heads = script.get_heads()
          if len(heads) != 1:
              print(f'ERROR: Expected 1 migration head, found {len(heads)}: {heads}')
              sys.exit(1)
          revs = list(script.walk_revisions())
          print(f'OK: {len(revs)} migrations, single head: {heads[0]}')
          "

      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose -f compose.dev.yaml down -v || true

  backend-tests-skipped:
    name: AxiomFolio backend (pytest against shared stack)
    needs: changes
    if: needs.changes.outputs.backend != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "No axiomfolio backend changes; skipping real tests."

  frontend-checks:
    name: AxiomFolio frontend (lint/typecheck/test)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    # Heavy: full pnpm install + Next.js workspace tests. Lint/typecheck happen
    # here too, but the unit-test step is the cost driver — keep them together.
    runs-on: [self-hosted, hetzner]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        # Self-hosted runners do not ship npm on PATH like ubuntu-latest; install
        # Node first so pnpm/action-setup can bootstrap via npm.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20

      - name: Setup pnpm
        # Version comes from packageManager field in root package.json;
        # specifying it here would conflict with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      - name: Install (from repo root; pnpm workspace)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @paperwork-labs/axiomfolio run lint

      - name: Typecheck
        run: pnpm --filter @paperwork-labs/axiomfolio run type-check

      - name: Unit tests
        run: pnpm --filter @paperwork-labs/axiomfolio run test

  frontend-checks-skipped:
    name: AxiomFolio frontend (lint/typecheck/test)
    needs: changes
    if: needs.changes.outputs.frontend != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "No axiomfolio frontend changes; skipping real checks."

  medallion-check:
    name: Medallion import-layer gate
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: apis/axiomfolio
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install medallion deps
        run: pip install pyyaml
      - name: Run medallion-check
        run: make medallion-check

  medallion-check-sql:
    name: "Iron Law #1 — append-only ledgers"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: apis/axiomfolio
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Run medallion-check-sql
        run: make medallion-check-sql
