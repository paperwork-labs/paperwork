name: AxiomFolio CI

# Runs on changes under apis/axiomfolio/ or apps/axiomfolio/ (or the shared
# dev-stack compose). Uses the unified root compose (infra/compose.dev.yaml)
# for backend tests; frontend checks run natively via npm.
#
# See docs/INFRA.md for the architecture.

"on":
  pull_request:
    branches: [main]
    paths:
      - "apis/axiomfolio/**"
      - "apps/axiomfolio/**"
      - "infra/compose.dev.yaml"
      - "infra/init-test-db.sh"
      - "infra/env.dev.defaults"
      - "infra/axiomfolio/**"
      - ".github/workflows/axiomfolio-ci.yml"
  push:
    branches: [main]
    paths:
      - "apis/axiomfolio/**"
      - "apps/axiomfolio/**"
      - "infra/compose.dev.yaml"
      - "infra/init-test-db.sh"
      - "infra/env.dev.defaults"
      - "infra/axiomfolio/**"
      - ".github/workflows/axiomfolio-ci.yml"
  workflow_dispatch:

concurrency:
  group: axiomfolio-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths (axiomfolio)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.decide.outputs.backend }}
      frontend: ${{ steps.decide.outputs.frontend }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run path filter (pull_request only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            backend:
              - 'apis/axiomfolio/app/**'
              - 'apis/axiomfolio/Dockerfile'
              - 'apis/axiomfolio/requirements*.txt'
              - 'apis/axiomfolio/pyproject.toml'
              - 'apis/axiomfolio/Makefile'
              - 'apis/axiomfolio/scripts/**'
              - 'infra/compose.dev.yaml'
              - 'infra/init-test-db.sh'
              - 'infra/env.dev.defaults'
              - 'infra/axiomfolio/**'
              - '.github/workflows/axiomfolio-ci.yml'
            frontend:
              - 'apps/axiomfolio/**'
              - '.github/workflows/axiomfolio-ci.yml'

      - name: Decide which jobs need real work
        id: decide
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          else
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

  backend-tests:
    name: AxiomFolio backend (pytest against shared stack)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Stub .env.secrets (compose expects the file to exist)
        run: touch .env.secrets

      - name: Boot shared postgres + redis
        working-directory: infra
        run: |
          docker compose -f compose.dev.yaml up -d postgres redis
          # Wait for postgres to accept connections and init-test-db.sh to run.
          for i in $(seq 1 30); do
            if docker compose -f compose.dev.yaml exec -T postgres \
                pg_isready -U paperwork -d axiomfolio_test >/dev/null 2>&1; then
              echo "postgres ready"; break
            fi
            echo "waiting for postgres... ($i/30)"; sleep 2
          done

      - name: Run axiomfolio backend tests (axiomfolio_test DB)
        working-directory: apis/axiomfolio
        run: make test

      - name: Migration chain integrity
        working-directory: apis/axiomfolio
        run: |
          docker compose --project-name paperwork \
            -f ../../infra/compose.dev.yaml \
            run --rm --no-deps \
            -e DATABASE_URL=postgresql://paperwork:paperwork_dev@postgres:5432/axiomfolio_test \
            api-axiomfolio python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          import os, sys
          cfg = Config(os.path.join('app', 'alembic.ini'))
          cfg.set_main_option('script_location', os.path.join('app', 'alembic'))
          script = ScriptDirectory.from_config(cfg)
          heads = script.get_heads()
          if len(heads) != 1:
              print(f'ERROR: Expected 1 migration head, found {len(heads)}: {heads}')
              sys.exit(1)
          revs = list(script.walk_revisions())
          print(f'OK: {len(revs)} migrations, single head: {heads[0]}')
          "

      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose -f compose.dev.yaml down -v || true

  backend-tests-skipped:
    name: AxiomFolio backend (pytest against shared stack)
    needs: changes
    if: needs.changes.outputs.backend != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "No axiomfolio backend changes; skipping real tests."

  frontend-checks:
    name: AxiomFolio frontend (lint/typecheck/test)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/axiomfolio
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/axiomfolio/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Unit tests
        run: npm run test

  frontend-checks-skipped:
    name: AxiomFolio frontend (lint/typecheck/test)
    needs: changes
    if: needs.changes.outputs.frontend != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "No axiomfolio frontend changes; skipping real checks."

  medallion-check:
    name: Medallion import-layer gate
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: apis/axiomfolio
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
        with:
          python-version: "3.11"
      - name: Run medallion-check
        run: make medallion-check

  medallion-check-sql:
    name: "Iron Law #1 — append-only ledgers"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: apis/axiomfolio
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
        with:
          python-version: "3.11"
      - name: Run medallion-check-sql
        run: make medallion-check-sql
