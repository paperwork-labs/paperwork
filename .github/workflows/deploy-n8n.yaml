name: Deploy n8n workflows

on:
  push:
    branches: [main]
    paths:
      - 'infra/hetzner/workflows/*.json'
  workflow_dispatch: {}

concurrency:
  group: deploy-n8n
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create remote temp directory
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_HOST_FINGERPRINT }}
          script: mkdir -p /tmp/paperwork-workflows

      - name: Upload workflow files
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_HOST_FINGERPRINT }}
          source: "infra/hetzner/workflows/*.json"
          target: "/tmp/paperwork-workflows"
          strip_components: 3

      - name: Upsert, activate, and verify via REST API
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          SLACK_ALERTS_WEBHOOK_URL: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          DEPLOY_COMMIT: ${{ github.sha }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_HOST_FINGERPRINT }}
          envs: SLACK_ALERTS_WEBHOOK_URL,DEPLOY_COMMIT
          script: |
            set -euo pipefail
            N8N_KEY=$(grep "^N8N_API_KEY=" /opt/paperwork-ops/.env | cut -d= -f2-)
            API="http://localhost:5678/api/v1"

            JSON_COUNT=$(ls /tmp/paperwork-workflows/*.json 2>/dev/null | wc -l | tr -d ' ')
            if [ "$JSON_COUNT" -eq 0 ]; then
              echo "No JSON files found"
              exit 1
            fi

            echo "=== Fetching existing workflows ==="
            existing=$(curl -s "$API/workflows?limit=250" -H "X-N8N-API-KEY: $N8N_KEY")

            echo "=== Upserting $JSON_COUNT workflows ==="
            for f in /tmp/paperwork-workflows/*.json; do
              name=$(python3 -c "import json; print(json.load(open('$f'))['name'])" 2>/dev/null || echo "")
              [ -z "$name" ] && continue

              cleaned=$(python3 -c "
            import json, sys
            with open('$f') as fh:
                wf = json.load(fh)
            for key in ['tags', 'meta', 'pinData']:
                wf.pop(key, None)
            json.dump(wf, sys.stdout)
            ")

              wf_id=$(echo "$existing" | WF_NAME="$name" python3 -c "
            import json, sys, os
            data = json.load(sys.stdin).get('data', [])
            target = os.environ.get('WF_NAME', '')
            matches = [w['id'] for w in data if w.get('name') == target]
            print(matches[0] if matches else '')
            " 2>/dev/null || echo "")

              if [ -n "$wf_id" ]; then
                update_code=$(echo "$cleaned" | python3 -c "
            import json, sys
            wf = json.load(sys.stdin)
            keep = {'name': wf['name'], 'nodes': wf['nodes'], 'connections': wf['connections'], 'settings': wf.get('settings', {})}
            json.dump(keep, sys.stdout)
            " | curl -sfS -o /dev/null -w "%{http_code}" -X PUT "$API/workflows/$wf_id" \
                  -H "X-N8N-API-KEY: $N8N_KEY" \
                  -H "Content-Type: application/json" \
                  -d @-)
                echo "  UPDATE: $name (id=$wf_id) -> HTTP $update_code"
              else
                resp=$(echo "$cleaned" | curl -s -w "\n%{http_code}" -X POST "$API/workflows" \
                  -H "X-N8N-API-KEY: $N8N_KEY" \
                  -H "Content-Type: application/json" \
                  -d @-)
                code=$(echo "$resp" | tail -1)
                wf_id=$(echo "$resp" | sed '$d' | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
                echo "  CREATE: $name (id=$wf_id) -> HTTP $code"
              fi

              if [ -n "$wf_id" ]; then
                curl -s -o /dev/null -X POST "$API/workflows/$wf_id/activate" \
                  -H "X-N8N-API-KEY: $N8N_KEY" || true
              fi
            done

            echo "=== Verifying ==="
            sleep 3
            TOTAL=$(curl -s "$API/workflows?limit=250" -H "X-N8N-API-KEY: $N8N_KEY" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('data',[])))")
            ACTIVE=$(curl -s "$API/workflows?active=true&limit=250" -H "X-N8N-API-KEY: $N8N_KEY" | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('data',[])))")
            N8N_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' https://n8n.paperworklabs.com/ --max-time 10 || echo "000")

            COMMIT_SHORT=$(echo "${DEPLOY_COMMIT:-unknown}" | cut -c1-7)

            if [ "$ACTIVE" -lt "$TOTAL" ]; then
              INACTIVE=$(curl -s "$API/workflows?active=false&limit=250" -H "X-N8N-API-KEY: $N8N_KEY" | python3 -c "import json,sys; print(', '.join(w['name'] for w in json.load(sys.stdin).get('data',[])))")
              echo "WARNING: $ACTIVE/$TOTAL active. Inactive: $INACTIVE"
              if [ -n "$SLACK_ALERTS_WEBHOOK_URL" ]; then
                jq -n --arg text ":warning: *n8n deploy*: $ACTIVE/$TOTAL active. Inactive: $INACTIVE ($COMMIT_SHORT)" \
                  '{text: $text}' | curl -sf -X POST "$SLACK_ALERTS_WEBHOOK_URL" -H 'Content-type: application/json' -d @- || true
              fi
              exit 1
            else
              echo "Deploy complete. $ACTIVE/$TOTAL active. n8n: $N8N_STATUS"
              if [ -n "$SLACK_ALERTS_WEBHOOK_URL" ]; then
                jq -n --arg text ":white_check_mark: *n8n deploy*: $ACTIVE/$TOTAL active ($N8N_STATUS) $COMMIT_SHORT" \
                  '{text: $text}' | curl -sf -X POST "$SLACK_ALERTS_WEBHOOK_URL" -H 'Content-type: application/json' -d @- || true
              fi
            fi

            rm -rf /tmp/paperwork-workflows
