name: Deploy n8n workflows

on:
  push:
    branches: [main]
    paths:
      - 'infra/hetzner/workflows/*.json'

concurrency:
  group: deploy-n8n
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create remote temp directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: mkdir -p /tmp/paperwork-workflows

      - name: Upload workflow files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "infra/hetzner/workflows/*.json"
          target: "/tmp/paperwork-workflows"
          strip_components: 3

      - name: Import, activate, and restart n8n
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            CONTAINER="paperwork-ops-n8n-1"
            FAILED=0

            echo "Importing workflows..."
            for f in /tmp/paperwork-workflows/*.json; do
              name=$(basename "$f")
              docker cp "$f" "$CONTAINER:/tmp/$name"
              docker exec "$CONTAINER" n8n import:workflow --input="/tmp/$name"
            done

            echo "Activating workflows..."
            IDS=$(docker exec "$CONTAINER" n8n list:workflow --json 2>/dev/null | grep -o '"id":"[^"]*"' | cut -d'"' -f4 || true)
            for id in $IDS; do
              if ! docker exec "$CONTAINER" n8n update:workflow --id="$id" --active=true 2>&1; then
                echo "ERROR: Failed to activate workflow $id"
                FAILED=1
              fi
            done

            echo "Restarting n8n..."
            docker restart "$CONTAINER"

            if [ "$FAILED" -ne 0 ]; then
              echo "Some workflows failed to activate — check logs above."
              exit 1
            fi

            echo "Done. All workflows imported, activated, and n8n restarted."
