name: Dependabot major-version LLM triage

# Uses Anthropic Claude Haiku to assess the risk of a major version bump
# and post a structured risk comment on the PR. Does NOT auto-merge —
# humans stay in the loop for majors.
#
# Trigger: the `deps:major` label is added to a dependabot PR (from the
# auto-approve workflow's classifier, or applied manually).
#
# Security:
#   * Uses `pull_request_target` — runs against base branch definition.
#   * Never checks out PR head. Only reads the diff via GitHub API.
#   * Strict output schema (JSON) from the model; defensive parsing.
#
# Required repo secret: ANTHROPIC_API_KEY.
# Cost: ~$0.001 per PR (Haiku 4.5, ~2k input + <500 output tokens).

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    if: >-
      github.event.label.name == 'deps:major' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout base branch (read-only, for usage grep)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Collect PR context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPS_NAMES: ${{ steps.meta.outputs.dependency-names }}
          PREV_VERSION: ${{ steps.meta.outputs.previous-version }}
          NEW_VERSION: ${{ steps.meta.outputs.new-version }}
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
        run: |
          set -euo pipefail

          # Truncated PR diff keeps the prompt cheap and bounded.
          gh pr diff "$PR_NUMBER" | head -n 200 > /tmp/pr.diff

          # Count import sites for each bumped dep (approximate signal
          # for the model). We're already on the base branch checkout.
          : > /tmp/usages.txt
          for dep in $DEPS_NAMES; do
            safe=$(printf '%s' "$dep" | sed 's/\./\\./g')
            count=$(grep -rIn --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              -E "(from|import|require).*['\"]${safe}([./'\"]|$)" . 2>/dev/null | wc -l || true)
            printf '%s: %s import sites\n' "$dep" "$count" >> /tmp/usages.txt
          done

      - name: Run Claude Haiku risk assessment
        id: llm
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
          DEPS: ${{ steps.meta.outputs.dependency-names }}
          PREV: ${{ steps.meta.outputs.previous-version }}
          NEW: ${{ steps.meta.outputs.new-version }}
        run: |
          set -euo pipefail
          python3 .github/scripts/dependabot_triage.py \
            --out /tmp/llm.json \
            --diff /tmp/pr.diff \
            --usages /tmp/usages.txt
          echo "--- llm.json ---"
          cat /tmp/llm.json

      - name: Post triage comment + risk label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          RISK=$(jq -r '.risk // "unknown"' /tmp/llm.json)
          SUMMARY=$(jq -r '.summary // ""' /tmp/llm.json)
          REC=$(jq -r '.recommendation // "review"' /tmp/llm.json)
          CONF=$(jq -r '.confidence // "low"' /tmp/llm.json)
          BREAKING=$(jq -r '(.breaking_changes // []) | map("- " + .) | join("\n")' /tmp/llm.json)
          AFFECTED=$(jq -r '(.affected_paths // []) | map("- " + .) | join("\n")' /tmp/llm.json)

          {
            echo "## Dependabot major-bump triage (Claude Haiku)"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Risk | **$RISK** |"
            echo "| Recommendation | **$REC** |"
            echo "| Confidence | $CONF |"
            echo
            echo "**Summary:** $SUMMARY"
            echo
            echo "**Known breaking changes:**"
            echo "$BREAKING"
            echo
            echo "**Affected paths in this repo:**"
            echo "$AFFECTED"
            echo
            echo "---"
            echo "_This assessment is advisory. Human review required before merging. Generated by \`dependabot-major-triage.yaml\`._"
          } > /tmp/comment.md

          gh pr comment "$PR_URL" --body-file /tmp/comment.md

          case "$RISK" in
            low)    gh pr edit "$PR_URL" --add-label "risk:low"    ;;
            medium) gh pr edit "$PR_URL" --add-label "risk:medium" ;;
            high)   gh pr edit "$PR_URL" --add-label "risk:high"   ;;
          esac
