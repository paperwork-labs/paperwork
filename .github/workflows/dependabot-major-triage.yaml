name: Dependabot major-bump triage

# When dependabot-auto-approve.yaml labels a major bump with `deps:major`,
# this workflow runs Claude Haiku against the PR to produce a structured risk
# assessment. Output: a risk:low|medium|high label + a PR comment.
#
# Kept separate from the auto-approve workflow so:
#   - Changes to the LLM prompt / model don't touch the hot path for safe bumps.
#   - The triage can be re-run independently via workflow_dispatch.

on:
  pull_request_target:
    types: [labeled, opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to re-triage
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    # Run only when:
    #   (A) a PR was labeled `deps:major` (from auto-approve workflow), OR
    #   (B) manually dispatched.
    if: |
      (github.event_name == 'pull_request_target' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'deps:major') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve PR number
        id: pr
        env:
          EVENT_PR: ${{ github.event.pull_request.number }}
          DISPATCH_PR: ${{ github.event.inputs.pr_number }}
        run: |
          NUM="${EVENT_PR:-$DISPATCH_PR}"
          if [ -z "$NUM" ]; then
            echo "::error::No PR number resolved"
            exit 1
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          # Check out the base branch, NOT the PR head — we don't execute
          # any untrusted Dependabot code, only its metadata + diff summary.
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install triage deps
        run: pip install --quiet httpx

      - name: Collect PR context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr view "$PR_NUMBER" --json title,body,additions,deletions,changedFiles,labels \
            > /tmp/pr.json
          gh pr diff "$PR_NUMBER" > /tmp/pr.diff || true
          # Cap diff at 40k chars — Haiku context is cheap but not free.
          head -c 40000 /tmp/pr.diff > /tmp/pr.diff.capped
          mv /tmp/pr.diff.capped /tmp/pr.diff
          echo "diff-bytes=$(wc -c < /tmp/pr.diff)" >> "$GITHUB_OUTPUT"

      - name: Run Haiku triage
        id: triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — skipping LLM triage, applying neutral label"
            echo "risk=medium" >> "$GITHUB_OUTPUT"
            echo "summary=LLM triage skipped (no ANTHROPIC_API_KEY). Human review required." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 .github/scripts/dependabot_triage.py \
            --pr-meta /tmp/pr.json \
            --pr-diff /tmp/pr.diff \
            --out /tmp/triage.json

          RISK=$(python3 -c "import json; print(json.load(open('/tmp/triage.json')).get('risk','medium'))")
          echo "risk=$RISK" >> "$GITHUB_OUTPUT"

      - name: Post triage comment + label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          RISK: ${{ steps.triage.outputs.risk }}
        run: |
          # Compose the comment body from the structured JSON (if present).
          if [ -f /tmp/triage.json ]; then
            python3 .github/scripts/dependabot_triage.py \
              --render-comment /tmp/triage.json > /tmp/comment.md
          else
            echo "LLM triage did not produce a report. Human review required." > /tmp/comment.md
          fi

          gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md

          # Normalize "medium" variants + apply label. Remove any pre-existing
          # risk:* labels so the final label reflects the latest triage.
          gh pr edit "$PR_NUMBER" --remove-label "risk:low,risk:medium,risk:high" 2>/dev/null || true

          case "$RISK" in
            low)    gh pr edit "$PR_NUMBER" --add-label "risk:low" ;;
            high)   gh pr edit "$PR_NUMBER" --add-label "risk:high" ;;
            *)      gh pr edit "$PR_NUMBER" --add-label "risk:medium" ;;
          esac
