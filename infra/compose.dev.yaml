name: filefree

services:
  postgres:
    container_name: filefree-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: filefree
      POSTGRES_PASSWORD: filefree_dev
      POSTGRES_DB: filefree_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filefree -d filefree_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: filefree-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: filefree-api
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../api:/app
      - ../pyproject.toml:/pyproject.toml:ro
    env_file:
      - env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    container_name: filefree-web
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../web:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - env.dev
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
