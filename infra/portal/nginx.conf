worker_processes 1;
events { worker_connections 256; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 10;

  # Compact access log on stdout; errors on stderr — standard Docker idiom.
  log_format dev '$remote_addr $request_time [$time_local] "$request" $status $body_bytes_sent';
  access_log /dev/stdout dev;
  error_log  /dev/stderr warn;

  # Portal is dev-only — no caching, so edits to index.html show up on reload.
  server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header X-Frame-Options "SAMEORIGIN";

    location / {
      try_files $uri $uri/ =404;
    }

    # Tiny health endpoint so compose healthcheck stays cheap.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
      default_type text/plain;
    }
  }
}
